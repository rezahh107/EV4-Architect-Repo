      valid_fixture: fixtures/architect-stage-payload/valid/minimal-complete.v1.json
      invalid_fixture: fixtures/architect-stage-payload/invalid/cases.v1.json
      CI_step: null
      sequence_CI_step: null
      runtime_monitor: null
      os_harness_policy: null
      downstream_contract: null
    status:
      enforcement_status: fixture_tested
      evidence_state: observed
    notes: >-
      Existing validation covers structure evidence references and wrapper justification presence, but Wave 1 found no enforcement requiring a Kernel decision card for the structural choice itself.

