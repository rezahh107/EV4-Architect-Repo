    detected_problem: >-
      approved_structure_model.structure_nodes[].node_kind enumerates structural choices such as structural_container, decoration_layer, overlay_stage, connector_layer, wrapper, and component_candidate, while wrapper_justification.reason can approve containment, responsive order, overlay containment, decoration isolation, and widget-native requirements. These fields can carry container_type, positioning_mode, semantic_element_choice, or responsive_strategy decisions without a required Kernel decision record.
    kernel_mapping:
      mapping_status: mapped
      decision_family: positioning_mode
      required_decision_card_ref_pattern: kernel/decision-cards/positioning-mode.v1.json
      not_applicable_reason: null
    rule_shape:
      trigger: An Architect Stage Payload is emitted or accepted with approved_structure_model.structure_nodes entries or wrapper_justification values.
      predicate: Any Kernel-governed structural or positioning choice carried by node_kind or wrapper_justification must include a valid Kernel decision record with decision lineage.
      enforcement: Current evidence is schema/prose only for structure shape and evidence refs; no Kernel decision-record enforcement was implemented in Wave 1.
    carriers:
      prose_source: docs/architecture/EV4_CONSUMER_DECISION_TRIGGER_ARCHITECTURE.md
