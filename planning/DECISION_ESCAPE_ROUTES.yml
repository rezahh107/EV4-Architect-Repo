  - escape_route_id: ARCH-ESC-001
    rule_id: EV4-ARCH-DECISION-001
    concept: Architect Stage Payload architecture_family can carry container choice without Kernel decision record
    risk: Critical
    session_scope: per_artifact
    recovery_action: block
    consumer_repo: EV4-Architect-Repo
    consumer_stage: architect
    surface_type: schema
    file_path: schemas/ev4-architect-stage-payload.v1.schema.json
    trigger_type: payload_acceptance
    detected_problem: >-
      The canonical Architect Stage Payload requires architecture_identity.architecture_family and accepts a free non-empty string. A value such as Relative Stage, Flex, Grid, SVG Connector Layer, or equivalent architecture-family wording can carry container_type or positioning_mode decisions while the payload schema has no Kernel decision record field requiring decision_family, decision_card_ref, selected_option, rejected_options, evidence_refs, and evidence_state for that decision.
    kernel_mapping:
      mapping_status: mapped
      decision_family: container_type
      required_decision_card_ref_pattern: kernel/decision-cards/container-type.v1.json
      not_applicable_reason: null
    rule_shape:
      trigger: An Architect Stage Payload is emitted or accepted with architecture_identity.architecture_family populated.
      predicate: The architecture-family choice must be backed by a Kernel decision record for the applicable container_type or positioning_mode decision before the artifact can be treated as accepted Architect evidence.
      enforcement: Current evidence is schema/prose only for Architect payload shape; no Kernel decision-record enforcement was implemented in Wave 1.
    carriers:
      prose_source: docs/architecture/EV4_CONSUMER_DECISION_TRIGGER_ARCHITECTURE.md
      schema_carrier: schemas/ev4-architect-stage-payload.v1.schema.json#/definitions/architecture_identity/properties/architecture_family
      validator_rule: null
      valid_fixture: fixtures/architect-stage-payload/valid/minimal-complete.v1.json
      invalid_fixture: null
      CI_step: null
      sequence_CI_step: null
      runtime_monitor: null
      os_harness_policy: null
      downstream_contract: null
    status:
      enforcement_status: schema_backed
      evidence_state: observed
    notes: >-
      Wave 1 records the escape route only. Existing schema validates that a string exists, not that the string is backed by a Kernel decision card or selected/rejected options.

  - escape_route_id: ARCH-ESC-002
    rule_id: EV4-ARCH-DECISION-002
    concept: Approved structure node kind and wrapper justification can carry container or positioning decisions without Kernel decision record
