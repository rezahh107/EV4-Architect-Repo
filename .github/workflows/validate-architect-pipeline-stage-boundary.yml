name: validate-architect-pipeline-stage-boundary

on:
  pull_request:
    paths:
      - 'contracts/ARCHITECT_PIPELINE_STAGE_ARTIFACT_V1.md'
      - 'contracts/STAGE_ANCHOR_CONTRACT.md'
      - 'schemas/**'
      - 'fixtures/architect-pipeline-stage-boundary/**'
      - 'scripts/check-architect-pipeline-stage-boundary.py'
      - 'tests/test_architect_pipeline_stage_boundary_validator.py'
      - 'stages/02_DECOMPOSE.md'
      - 'stages/03_ARCHITECTURES.md'
      - 'stages/04_SCORE_EVIDENCE.md'
      - 'stages/05_SCORE_AUDIT.md'
      - 'manifests/architect-pipeline-manifest.v1.json'
      - 'planning/DECISION_ESCAPE_ROUTES.yml'
      - '.github/workflows/validate-architect-pipeline-stage-boundary.yml'

permissions:
  contents: read


jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact pull request head
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false
      - name: Assert exact pull request head
        shell: bash
        run: test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha }}"
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.11'
      - name: Install pinned validation dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install 'jsonschema>=4.22.0' 'pytest>=8.0.0' 'PyYAML>=6.0.0'
      - name: Compile stage boundary validator
        run: PYTHONDONTWRITEBYTECODE=1 python -m py_compile scripts/check-architect-pipeline-stage-boundary.py
      - name: Validate JSON schemas with Draft 2020-12
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          from jsonschema import Draft202012Validator
          for schema_path in sorted(Path('schemas').glob('ev4-*v1.schema.json')):
              schema = json.loads(schema_path.read_text())
              Draft202012Validator.check_schema(schema)
          PY
      - name: Run canonical validation bundle transaction twice
        run: |
          rm -rf /tmp/ev4-validation-bundle-1 /tmp/ev4-validation-bundle-2
          PYTHONDONTWRITEBYTECODE=1 python scripts/check-architect-pipeline-stage-boundary.py validate-run --sequence fixtures/architect-pipeline-stage-boundary/valid/complete-sequence --output /tmp/ev4-validation-bundle-1 --format json
          PYTHONDONTWRITEBYTECODE=1 python scripts/check-architect-pipeline-stage-boundary.py validate-run --sequence fixtures/architect-pipeline-stage-boundary/valid/complete-sequence --output /tmp/ev4-validation-bundle-2 --format json
          PYTHONDONTWRITEBYTECODE=1 python scripts/check-architect-pipeline-stage-boundary.py validate-bundle --bundle /tmp/ev4-validation-bundle-1 --format json
          diff -ru /tmp/ev4-validation-bundle-1 /tmp/ev4-validation-bundle-2
      - name: Validate Architect stage boundary fixtures
        run: PYTHONDONTWRITEBYTECODE=1 python scripts/check-architect-pipeline-stage-boundary.py --fixtures
      - name: Run stage boundary regression tests
        run: PYTHONDONTWRITEBYTECODE=1 PYTEST_DISABLE_PLUGIN_AUTOLOAD=1 pytest -p no:cacheprovider -q tests/test_architect_pipeline_stage_boundary_validator.py
      - name: Run legacy compatibility tests
        run: |
          PYTHONDONTWRITEBYTECODE=1 python scripts/check-architect-stage-payload.py
          PYTHONDONTWRITEBYTECODE=1 PYTEST_DISABLE_PLUGIN_AUTOLOAD=1 pytest -p no:cacheprovider -q tests/test_architect_stage_payload_validator.py
      - name: Fail on untracked generated output
        run: |
          git status --porcelain
          test -z "$(git status --porcelain)"
