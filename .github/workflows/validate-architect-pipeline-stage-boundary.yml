name: validate-architect-pipeline-stage-boundary

on:
  pull_request:
    paths:
      - 'contracts/ARCHITECT_PIPELINE_STAGE_ARTIFACT_V1.md'
      - 'contracts/STAGE_ANCHOR_CONTRACT.md'
      - 'schemas/ev4-architect-pipeline-stage-artifact.v1.schema.json'
      - 'schemas/ev4-architect-stage-validation-receipt.v1.schema.json'
      - 'fixtures/architect-pipeline-stage-boundary/**'
      - 'scripts/check-architect-pipeline-stage-boundary.py'
      - 'tests/test_architect_pipeline_stage_boundary_validator.py'
      - 'stages/02_DECOMPOSE.md'
      - 'stages/03_ARCHITECTURES.md'
      - 'stages/04_SCORE_EVIDENCE.md'
      - 'stages/05_SCORE_AUDIT.md'
      - 'manifests/architect-pipeline-manifest.v1.json'
      - 'planning/DECISION_ESCAPE_ROUTES.yml'
      - '.github/workflows/validate-architect-pipeline-stage-boundary.yml'

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact pull request head
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false
      - name: Assert exact pull request head
        shell: bash
        run: test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha }}"
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.11'
      - name: Install validation dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install 'jsonschema>=4.22.0' 'pytest>=8.0.0'
      - name: Compile stage boundary validator
        run: python -m py_compile scripts/check-architect-pipeline-stage-boundary.py
      - name: Validate Architect stage boundary fixtures
        run: python scripts/check-architect-pipeline-stage-boundary.py --fixtures
      - name: Run stage boundary regression tests
        run: PYTEST_DISABLE_PLUGIN_AUTOLOAD=1 pytest -q tests/test_architect_pipeline_stage_boundary_validator.py
