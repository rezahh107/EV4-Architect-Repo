name: validate-architect-pipeline-stage-boundary

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
    paths:
      - 'contracts/ARCHITECT_PIPELINE_STAGE_ARTIFACT_V1.md'
      - 'contracts/STAGE_ANCHOR_CONTRACT.md'
      - 'schemas/**'
      - 'fixtures/architect-pipeline-stage-boundary/**'
      - 'scripts/check-architect-pipeline-stage-boundary.py'
      - 'scripts/architect_validation_*.py'
      - 'tests/test_architect_pipeline_stage_boundary_validator.py'
      - 'stages/02_DECOMPOSE.md'
      - 'stages/03_ARCHITECTURES.md'
      - 'stages/04_SCORE_EVIDENCE.md'
      - 'stages/05_SCORE_AUDIT.md'
      - 'manifests/architect-pipeline-manifest.v1.json'
      - 'planning/DECISION_ESCAPE_ROUTES.yml'
      - '.github/workflows/validate-architect-pipeline-stage-boundary.yml'

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact pull request head
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      - name: Assert exact pull request head
        shell: sh
        run: test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha }}"

      - name: Record clean checkout
        shell: bash
        run: |
          set -euo pipefail
          echo 'repository_status_checkpoint=after_checkout'
          git status --porcelain
          test -z "$(git status --porcelain)"

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.11'

      - name: Install pinned validation dependencies and check cleanliness
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install 'jsonschema>=4.22.0' 'pytest>=8.0.0' 'PyYAML>=6.0.0'
          echo 'repository_status_checkpoint=after_install'
          git status --porcelain
          test -z "$(git status --porcelain)"

      - name: Compile outside repository and check cleanliness
        shell: bash
        run: |
          set -euo pipefail
          python -B - <<'PY'
          import py_compile
          from pathlib import Path

          paths = [Path('scripts/check-architect-pipeline-stage-boundary.py')]
          paths.extend(sorted(Path('scripts').glob('architect_validation_*.py')))
          for path in paths:
              py_compile.compile(
                  str(path),
                  cfile=f'/tmp/{path.name}.pyc',
                  doraise=True,
              )
          PY
          echo 'repository_status_checkpoint=after_compile'
          git status --porcelain
          test -z "$(git status --porcelain)"

      - name: Validate current Schemas with Draft 2020-12
        shell: bash
        run: |
          python -B - <<'PY'
          import json
          from pathlib import Path
          from jsonschema import Draft202012Validator

          names = [
              'ev4-architect-pipeline-stage-artifact.v1.schema.json',
              'ev4-architect-stage-validation-receipt.v1.schema.json',
              'ev4-architect-validation-failure-event.v1.schema.json',
              'ev4-stage-boundary-record.v1.schema.json',
              'ev4-stage-anchor.v1.schema.json',
              'ev4-architect-validation-bundle.v1.schema.json',
          ]
          for name in names:
              schema = json.loads((Path('schemas') / name).read_text())
              Draft202012Validator.check_schema(schema)
          PY

      - name: Run deterministic success and failure Bundle transactions
        shell: bash
        run: |
          set -euo pipefail
          rm -rf /tmp/ev4-valid-bundle-1 /tmp/ev4-valid-bundle-2 /tmp/ev4-failure-bundle-1 /tmp/ev4-failure-bundle-2
          python -B scripts/check-architect-pipeline-stage-boundary.py validate-run --sequence fixtures/architect-pipeline-stage-boundary/valid/complete-sequence --output /tmp/ev4-valid-bundle-1 --format json
          python -B scripts/check-architect-pipeline-stage-boundary.py validate-run --sequence fixtures/architect-pipeline-stage-boundary/valid/complete-sequence --output /tmp/ev4-valid-bundle-2 --format json
          diff -ru /tmp/ev4-valid-bundle-1 /tmp/ev4-valid-bundle-2
          python -B scripts/check-architect-pipeline-stage-boundary.py validate-bundle --bundle /tmp/ev4-valid-bundle-1 --format json
          set +e
          python -B scripts/check-architect-pipeline-stage-boundary.py validate-run --sequence fixtures/architect-pipeline-stage-boundary/invalid/cross-stage-architectures-to-decompose --output /tmp/ev4-failure-bundle-1 --format json
          failure_exit_1=$?
          python -B scripts/check-architect-pipeline-stage-boundary.py validate-run --sequence fixtures/architect-pipeline-stage-boundary/invalid/cross-stage-architectures-to-decompose --output /tmp/ev4-failure-bundle-2 --format json
          failure_exit_2=$?
          set -e
          test "$failure_exit_1" -eq 1
          test "$failure_exit_2" -eq 1
          diff -ru /tmp/ev4-failure-bundle-1 /tmp/ev4-failure-bundle-2
          python -B scripts/check-architect-pipeline-stage-boundary.py validate-bundle --bundle /tmp/ev4-failure-bundle-1 --format json
          echo 'repository_status_checkpoint=after_bundle_tests'
          git status --porcelain
          test -z "$(git status --porcelain)"

      - name: Validate fixtures and focused regression tests
        shell: bash
        run: |
          set -euo pipefail
          python -B scripts/check-architect-pipeline-stage-boundary.py --fixtures
          PYTEST_DISABLE_PLUGIN_AUTOLOAD=1 python -B -m pytest -p no:cacheprovider -q tests/test_architect_pipeline_stage_boundary_validator.py
          echo 'repository_status_checkpoint=after_pytest'
          git status --porcelain
          test -z "$(git status --porcelain)"

      - name: Run legacy payload and governance compatibility checks
        shell: bash
        run: |
          set -euo pipefail
          python -B scripts/check-architect-stage-payload.py
          PYTEST_DISABLE_PLUGIN_AUTOLOAD=1 python -B -m pytest -p no:cacheprovider -q tests/test_architect_stage_payload_validator.py
          python -B scripts/check-decision-escape-routes.py

      - name: Final repository cleanliness assertion
        shell: bash
        run: |
          set -euo pipefail
          echo 'repository_status_checkpoint=final'
          git status --porcelain
          test -z "$(git status --porcelain)"
