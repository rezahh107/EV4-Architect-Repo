name: validate-architect-pipeline-stage-boundary

on:
  pull_request:
    paths:
      - '02_PROJECT_INSTRUCTIONS_ACTIVE_OVERRIDES.md'
      - 'AGENTS.md'
      - 'README.md'
      - 'STATUS.md'
      - 'contracts/ARCHITECT_PIPELINE_STAGE_ARTIFACT_V1.md'
      - 'contracts/PARTIAL_RERUN_CONTRACT.md'
      - 'contracts/STAGE_ANCHOR_CONTRACT.md'
      - 'docs/governance/AI_AUTHORITY_GOVERNANCE_ADOPTION.md'
      - 'experiments/END_TO_END_PIPELINE_TEST_PLAN.md'
      - 'knowledge/TUYA_ELEMENTOR_V4_CONCEPTS.md'
      - 'references/ELEMENTOR_KNOWLEDGE_BASE_RAG_STRATEGY.md'
      - 'release/EV4_PROJECT_RELEASE_PACK_v1/**'
      - 'schemas/**'
      - 'fixtures/architect-pipeline-stage-boundary/**'
      - 'scripts/check-architect-validation-profiles.py'
      - 'scripts/check-architect-pipeline-stage-boundary.py'
      - 'scripts/architect_validation_*.py'
      - 'tests/test_architect_pipeline_stage_boundary_validator.py'
      - 'tests/test_architect_validation_profiles.py'
      - 'tests/test_architect_validation_transaction_mutations.py'
      - 'stages/**'
      - 'manifests/architect-pipeline-manifest.v1.json'
      - 'manifests/architect-stage-validation-profiles.v1.json'
      - 'planning/DECISION_ESCAPE_ROUTES.yml'
      - '.github/workflows/validate-architect-pipeline-stage-boundary.yml'

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact pull request head
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      - name: Assert exact pull request head
        run: test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha }}"

      - name: Check clean checkout
        run: |
          set -euo pipefail
          echo 'repository_status_checkpoint=after_checkout'
          git status --porcelain
          test -z "$(git status --porcelain)"

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.11'

      - name: Install pinned validation dependencies and check cleanliness
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install 'jsonschema>=4.22.0' 'pytest>=8.0.0' 'PyYAML>=6.0.0'
          echo 'repository_status_checkpoint=after_install'
          git status --porcelain
          test -z "$(git status --porcelain)"

      - name: Compile outside repository and check cleanliness
        env:
          PYTHONDONTWRITEBYTECODE: '1'
        run: |
          set -euo pipefail
          python - <<'PY'
          import py_compile
          from pathlib import Path
          paths = [
              Path('scripts/check-architect-pipeline-stage-boundary.py'),
              Path('scripts/check-architect-validation-profiles.py'),
          ]
          paths.extend(sorted(Path('scripts').glob('architect_validation_*.py')))
          for path in paths:
              py_compile.compile(
                  str(path),
                  cfile=f'/tmp/{path.name}.pyc',
                  doraise=True,
              )
          PY
          echo 'repository_status_checkpoint=after_compile'
          git status --porcelain
          test -z "$(git status --porcelain)"

      - name: Validate current Schemas with Draft 2020-12
        env:
          PYTHONDONTWRITEBYTECODE: '1'
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          from jsonschema import Draft202012Validator
          names = [
              'ev4-architect-pipeline-manifest.v1.schema.json',
              'architect-stage-validation-profiles.v1.schema.json',
              'ev4-architect-pipeline-stage-artifact.v1.schema.json',
              'ev4-architect-stage-validation-receipt.v1.schema.json',
              'ev4-architect-validation-failure-event.v1.schema.json',
              'ev4-stage-boundary-record.v1.schema.json',
              'ev4-stage-anchor.v1.schema.json',
              'ev4-stage-anchor.v1.4.schema.json',
              'ev4-architect-validation-bundle.v1.schema.json',
              'ev4-architect-validation-bundle.v1.2.schema.json',
          ]
          for name in names:
              schema = json.loads((Path('schemas') / name).read_text())
              Draft202012Validator.check_schema(schema)
          PY

      - name: Validate Manifest and Validation Profiles authority
        env:
          PYTHONDONTWRITEBYTECODE: '1'
        run: |
          set -euo pipefail
          python scripts/check-architect-validation-profiles.py
          echo 'repository_status_checkpoint=after_profile_validation'
          git status --porcelain
          test -z "$(git status --porcelain)"

      - name: Run deterministic success and failure Bundle transactions
        env:
          PYTHONDONTWRITEBYTECODE: '1'
        run: |
          set -euo pipefail
          rm -rf /tmp/ev4-valid-bundle-1 /tmp/ev4-valid-bundle-2 /tmp/ev4-failure-bundle-1 /tmp/ev4-failure-bundle-2
          python scripts/check-architect-pipeline-stage-boundary.py validate-run --sequence fixtures/architect-pipeline-stage-boundary/valid/complete-sequence --output /tmp/ev4-valid-bundle-1 --format json
          python scripts/check-architect-pipeline-stage-boundary.py validate-run --sequence fixtures/architect-pipeline-stage-boundary/valid/complete-sequence --output /tmp/ev4-valid-bundle-2 --format json
          diff -ru /tmp/ev4-valid-bundle-1 /tmp/ev4-valid-bundle-2
          python scripts/check-architect-pipeline-stage-boundary.py validate-bundle --bundle /tmp/ev4-valid-bundle-1 --format json
          rm -rf /tmp/ev4-resolved-inactive-bundle
          python scripts/check-architect-pipeline-stage-boundary.py validate-run --sequence fixtures/architect-pipeline-stage-boundary/valid/resolved-inactive-unknowns-sequence --output /tmp/ev4-resolved-inactive-bundle --format json
          python scripts/check-architect-pipeline-stage-boundary.py validate-bundle --bundle /tmp/ev4-resolved-inactive-bundle --format json
          set +e
          python scripts/check-architect-pipeline-stage-boundary.py validate-run --sequence fixtures/architect-pipeline-stage-boundary/invalid/cross-stage-architectures-to-decompose --output /tmp/ev4-failure-bundle-1 --format json
          failure_exit_1=$?
          python scripts/check-architect-pipeline-stage-boundary.py validate-run --sequence fixtures/architect-pipeline-stage-boundary/invalid/cross-stage-architectures-to-decompose --output /tmp/ev4-failure-bundle-2 --format json
          failure_exit_2=$?
          set -e
          test "$failure_exit_1" -eq 1
          test "$failure_exit_2" -eq 1
          diff -ru /tmp/ev4-failure-bundle-1 /tmp/ev4-failure-bundle-2
          python scripts/check-architect-pipeline-stage-boundary.py validate-bundle --bundle /tmp/ev4-failure-bundle-1 --format json
          for case in \
            T19-missing-stage2 \
            T20-missing-stage3 \
            T21-missing-stage4 \
            T22-duplicate-stage2 \
            T23-stage-file-mismatch; do
            structural_output="/tmp/ev4-${case}-must-not-exist"
            rm -rf "$structural_output"
            set +e
            python scripts/check-architect-pipeline-stage-boundary.py validate-run \
              --sequence "fixtures/architect-pipeline-stage-boundary/invalid/${case}" \
              --output "$structural_output" \
              --format json
            structural_exit=$?
            set -e
            test "$structural_exit" -eq 1
            test ! -e "$structural_output"
          done
          echo 'repository_status_checkpoint=after_bundle_tests'
          git status --porcelain
          test -z "$(git status --porcelain)"

      - name: Validate Architect stage boundary fixtures and focused regression tests
        env:
          PYTHONDONTWRITEBYTECODE: '1'
        run: |
          set -euo pipefail
          python scripts/check-architect-pipeline-stage-boundary.py --fixtures
          PYTEST_DISABLE_PLUGIN_AUTOLOAD=1 pytest -p no:cacheprovider -q \
            tests/test_architect_pipeline_stage_boundary_validator.py \
            tests/test_architect_validation_profiles.py \
            tests/test_architect_validation_transaction_mutations.py
          echo 'repository_status_checkpoint=after_pytest'
          git status --porcelain
          test -z "$(git status --porcelain)"

      - name: Run legacy payload and governance compatibility checks
        env:
          PYTHONDONTWRITEBYTECODE: '1'
        run: |
          set -euo pipefail
          python scripts/check-architect-stage-payload.py
          PYTEST_DISABLE_PLUGIN_AUTOLOAD=1 pytest -p no:cacheprovider -q tests/test_architect_stage_payload_validator.py
          python scripts/check-decision-escape-routes.py

      - name: Final repository cleanliness assertion
        run: |
          set -euo pipefail
          echo 'repository_status_checkpoint=final'
          git status --porcelain
          test -z "$(git status --porcelain)"
