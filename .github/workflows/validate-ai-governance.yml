name: validate-ai-governance

on:
  pull_request:
    types: [synchronize, opened, reopened]
    paths:
      - 'scripts/pr26-patch-*.py'
      - '.github/workflows/validate-ai-governance.yml'

permissions:
  contents: read

jobs:
  diagnose-pr26-repair:
    if: github.event.pull_request.number == 26
    runs-on: ubuntu-latest
    steps:
      - name: Diagnose repaired tree read-only
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        shell: bash
        run: |
          set -euo pipefail
          rm -rf /tmp/repository /tmp/pr26-venv
          mkdir -p /tmp/repository
          curl --fail --silent --show-error --location \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H 'X-GitHub-Api-Version: 2022-11-28' \
            "https://api.github.com/repos/${REPOSITORY}/tarball/${HEAD_SHA}" \
            -o /tmp/repository.tar.gz
          tar -xzf /tmp/repository.tar.gz --strip-components=1 -C /tmp/repository
          cd /tmp/repository
          python3 scripts/pr26-patch-core.py
          python3 scripts/pr26-patch-tests.py
          python3 scripts/pr26-patch-workflow.py
          python3 -m venv /tmp/pr26-venv
          /tmp/pr26-venv/bin/python -m pip install -q \
            'jsonschema>=4.22.0' 'PyYAML>=6.0' 'pytest>=8.0.0'
          validator_status=0
          test_status=0
          echo '--- validator ---' > /tmp/validation-output.txt
          /tmp/pr26-venv/bin/python -I -P scripts/check-ai-governance.py \
            >> /tmp/validation-output.txt 2>&1 || validator_status=$?
          echo "validator_status=${validator_status}" >> /tmp/validation-output.txt
          echo '--- tests ---' >> /tmp/validation-output.txt
          PYTEST_DISABLE_PLUGIN_AUTOLOAD=1 PYTEST_ADDOPTS= PYTEST_PLUGINS= \
            /tmp/pr26-venv/bin/python -I -P -m pytest \
            -c /dev/null --noconftest -q tests/test_ai_governance.py \
            >> /tmp/validation-output.txt 2>&1 || test_status=$?
          echo "test_status=${test_status}" >> /tmp/validation-output.txt
          cat /tmp/validation-output.txt
          test "${validator_status}" -eq 0
          test "${test_status}" -eq 0
