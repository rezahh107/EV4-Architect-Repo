name: validate-ai-governance

on:
  pull_request:
    types: [synchronize, opened, reopened]
    paths:
      - '.github/workflows/**'

permissions:
  contents: write

jobs:
  commit-pr26-repair:
    if: github.event.pull_request.number == 26
    runs-on: ubuntu-latest
    steps:
      - name: Apply validate and push repaired tree
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        shell: bash
        run: |
          set -euo pipefail
          git clone --quiet --depth 1 --branch "${HEAD_REF}" \
            "https://x-access-token:${GH_TOKEN}@github.com/${REPOSITORY}.git" repository
          cd repository
          python3 .github/pr26_repair_fix.py
          python3 .github/pr26_repair.py
          python3 -I -P -m pip install -q 'jsonschema>=4.22.0' 'PyYAML>=6.0' 'pytest>=8.0.0'
          python3 -I -P scripts/check-ai-governance.py
          PYTEST_DISABLE_PLUGIN_AUTOLOAD=1 PYTEST_ADDOPTS= PYTEST_PLUGINS= \
            python3 -I -P -m pytest -c /dev/null --noconftest -q \
            tests/test_ai_governance.py
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add scripts/check-ai-governance.py tests/test_ai_governance.py
          git add -u .github
          git status --short
          git diff --cached --check
          git diff --cached --quiet && { echo 'No repair changes staged'; exit 1; }
          git commit -m 'Harden CI proof execution surface'
          git push --quiet origin "HEAD:${HEAD_REF}"
