name: validate-ai-governance

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Set up trusted Python for validator
        id: setup-validator-python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.11'
      - name: Install validation dependencies for validator
        shell: /usr/bin/sh -e {0}
        run: '"${{ steps.setup-validator-python.outputs.python-path }}" -I -P -m pip install ''jsonschema>=4.22.0'' ''PyYAML>=6.0'' ''pytest>=8.0.0'''
      - name: Checkout exact pull request head
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false
      - name: Assert exact pull request head
        shell: /usr/bin/sh -e {0}
        run: |
          set -eu
          test -x "${{ steps.setup-validator-python.outputs.python-path }}"
          test "$(/usr/bin/git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha }}"
          /usr/bin/git diff --exit-code -- .
          /usr/bin/git diff --cached --exit-code -- .
          test -z "$(/usr/bin/git status --porcelain=v1 --untracked-files=all)"
      - name: Validate AI governance coverage and fixtures
        shell: /usr/bin/sh -e {0}
        run: '"${{ steps.setup-validator-python.outputs.python-path }}" -I -P scripts/check-ai-governance.py'
      - name: Set up trusted Python for tests
        id: setup-test-python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.11'
      - name: Install validation dependencies for tests
        shell: /usr/bin/sh -e {0}
        run: '"${{ steps.setup-test-python.outputs.python-path }}" -I -P -m pip install ''jsonschema>=4.22.0'' ''PyYAML>=6.0'' ''pytest>=8.0.0'''
      - name: Checkout exact pull request head for tests
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false
      - name: Assert exact pull request head for tests
        shell: /usr/bin/sh -e {0}
        run: |
          set -eu
          test -x "${{ steps.setup-test-python.outputs.python-path }}"
          test "$(/usr/bin/git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha }}"
          /usr/bin/git diff --exit-code -- .
          /usr/bin/git diff --cached --exit-code -- .
          test -z "$(/usr/bin/git status --porcelain=v1 --untracked-files=all)"
      - name: Run AI governance regression tests
        shell: /usr/bin/sh -e {0}
        run: 'PYTEST_DISABLE_PLUGIN_AUTOLOAD=1 PYTEST_ADDOPTS= PYTEST_PLUGINS= "${{ steps.setup-test-python.outputs.python-path }}" -I -P -m pytest -c /dev/null --noconftest -q tests/test_ai_governance.py'
