name: validate-ai-governance

on:
  pull_request:
    types: [synchronize, opened, reopened]
    paths:
      - '.github/workflows/**'

permissions:
  contents: read

jobs:
  export-pr26-repair:
    if: github.event.pull_request.number == 26
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact pull request head
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false
          show-progress: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.11'
      - name: Apply validated repair
        shell: bash
        run: |
          set -euo pipefail
          python .github/pr26_repair_fix.py
          python .github/pr26_repair.py
      - name: Validate repaired tree
        shell: bash
        run: |
          set -euo pipefail
          python -I -P -m pip install -q \
            'jsonschema>=4.22.0' 'PyYAML>=6.0' 'pytest>=8.0.0'
          python -I -P scripts/check-ai-governance.py
          PYTEST_DISABLE_PLUGIN_AUTOLOAD=1 PYTEST_ADDOPTS= PYTEST_PLUGINS= \
            python -I -P -m pytest -c /dev/null --noconftest -q \
            tests/test_ai_governance.py
      - name: Package exact validated files
        shell: bash
        run: |
          set -euo pipefail
          test ! -e .github/pr26_repair.py
          test ! -e .github/pr26_repair_fix.py
          test ! -e .github/workflows/pr26-repair-proof-surface.yml
          test ! -e .github/workflows/pr26-trigger-temp.yml
          tar -czf pr26-final-repair.tar.gz \
            scripts/check-ai-governance.py \
            tests/test_ai_governance.py \
            .github/workflows/validate-ai-governance.yml
          sha256sum pr26-final-repair.tar.gz > pr26-final-repair.tar.gz.sha256
      - name: Upload validated repair
        uses: actions/upload-artifact@84480863f228bb9747b473957fcc9e309aa96097
        with:
          name: pr26-final-repair
          path: |
            pr26-final-repair.tar.gz
            pr26-final-repair.tar.gz.sha256
          if-no-files-found: error
          retention-days: 1
