name: validate-ai-governance

on:
  pull_request:
    types: [synchronize, opened, reopened]
    paths:
      - 'scripts/pr26-patch-*.py'
      - '.github/workflows/validate-ai-governance.yml'

permissions:
  contents: write

jobs:
  export-pr26-repair:
    if: github.event.pull_request.number == 26
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact pull request head
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.11'
      - name: Apply bounded repair
        shell: bash
        run: |
          set -euo pipefail
          python scripts/pr26-patch-core.py
          python scripts/pr26-patch-tests.py
          python scripts/pr26-patch-workflow.py
      - name: Validate repaired tree
        shell: bash
        run: |
          set -euo pipefail
          python -I -P -m pip install -q 'jsonschema>=4.22.0' 'PyYAML>=6.0' 'pytest>=8.0.0'
          python -I -P scripts/check-ai-governance.py
          PYTEST_DISABLE_PLUGIN_AUTOLOAD=1 PYTEST_ADDOPTS= PYTEST_PLUGINS= \
            python -I -P -m pytest -c /dev/null --noconftest -q \
            tests/test_ai_governance.py
      - name: Create immutable Git blobs
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          SOURCE_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        shell: bash
        run: |
          set -euo pipefail
          test ! -e scripts/pr26-patch-core.py
          test ! -e scripts/pr26-patch-tests.py
          test ! -e scripts/pr26-patch-workflow.py
          python - <<'PY'
          import base64
          import hashlib
          import json
          import os
          import subprocess
          import urllib.request
          from pathlib import Path

          repository = os.environ['REPOSITORY']
          token = os.environ['GH_TOKEN']
          paths = [
              'scripts/check-ai-governance.py',
              'tests/test_ai_governance.py',
              '.github/workflows/validate-ai-governance.yml',
          ]
          manifest = {
              'source_head_sha': os.environ['SOURCE_HEAD_SHA'],
              'base_tree_sha': subprocess.check_output(
                  ['git', 'rev-parse', 'HEAD^{tree}'], text=True
              ).strip(),
              'files': {},
          }
          for path in paths:
              data = Path(path).read_bytes()
              payload = json.dumps({
                  'content': base64.b64encode(data).decode('ascii'),
                  'encoding': 'base64',
              }).encode('utf-8')
              request = urllib.request.Request(
                  f'https://api.github.com/repos/{repository}/git/blobs',
                  data=payload,
                  method='POST',
                  headers={
                      'Accept': 'application/vnd.github+json',
                      'Authorization': f'Bearer {token}',
                      'X-GitHub-Api-Version': '2022-11-28',
                      'Content-Type': 'application/json',
                  },
              )
              with urllib.request.urlopen(request) as response:
                  result = json.load(response)
              manifest['files'][path] = {
                  'blob_sha': result['sha'],
                  'sha256': hashlib.sha256(data).hexdigest(),
                  'size': len(data),
              }
          Path('pr26-repair-manifest.json').write_text(
              json.dumps(manifest, indent=2, sort_keys=True) + '\n',
              encoding='utf-8',
          )
          print(json.dumps(manifest, sort_keys=True))
          PY
      - name: Upload repair manifest
        uses: actions/upload-artifact@84480863f228bb9747b473957fcc9e309aa96097
        with:
          name: pr26-repair-manifest
          path: pr26-repair-manifest.json
          if-no-files-found: error
          retention-days: 1
