name: validate-ai-governance

on:
  pull_request:
    paths:
      - 'planning/AI_GOVERNANCE_COVERAGE.yml'
      - 'planning/ai-governance-coverage.schema.json'
      - 'fixtures/ai-governance/**'
      - 'scripts/**'
      - 'tests/**'
      - 'pytest.ini'
      - 'pyproject.toml'
      - 'setup.cfg'
      - 'tox.ini'
      - 'conftest.py'
      - 'AGENTS.md'
      - 'docs/governance/AI_AUTHORITY_GOVERNANCE_ADOPTION.md'
      - '.github/actions/**'
      - '.github/workflows/**'

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.11'
      - name: Install validation dependencies
        run: python -I -P -m pip install 'jsonschema>=4.22.0' 'PyYAML>=6.0' 'pytest>=8.0.0'
      - name: Checkout exact pull request head for validator
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false
      - name: Guard exact head and clean workspace for validator
        shell: bash
        run: |
          set -eu
          test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha }}"
          git diff --exit-code -- .
          git diff --cached --exit-code -- .
          test -z "$(git status --porcelain=v1 --untracked-files=all)"
      - name: Validate AI governance coverage and fixtures
        run: python -I -P scripts/check-ai-governance.py
      - name: Checkout exact pull request head for tests
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false
      - name: Guard exact head and clean workspace for tests
        shell: bash
        run: |
          set -eu
          test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha }}"
          git diff --exit-code -- .
          git diff --cached --exit-code -- .
          test -z "$(git status --porcelain=v1 --untracked-files=all)"
      - name: Run AI governance regression tests
        run: PYTEST_DISABLE_PLUGIN_AUTOLOAD=1 PYTEST_ADDOPTS= PYTEST_PLUGINS= python -I -P -m pytest -c /dev/null --noconftest -q tests/test_ai_governance.py
