name: validate-ai-governance

on:
  pull_request:
    paths:
      - 'planning/AI_GOVERNANCE_COVERAGE.yml'
      - 'planning/ai-governance-coverage.schema.json'
      - 'fixtures/ai-governance/**'
      - 'scripts/check-ai-governance.py'
      - 'tests/test_ai_governance.py'
      - 'AGENTS.md'
      - 'docs/governance/AI_AUTHORITY_GOVERNANCE_ADOPTION.md'
      - '.github/workflows/**'

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact pull request head
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false
      - name: Assert exact pull request head
        shell: bash
        run: test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha }}"
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.11'
      - name: Install validation dependencies
        run: python -m pip install 'jsonschema>=4.22.0' 'PyYAML>=6.0' 'pytest>=8.0.0'
      - name: Validate AI governance coverage and fixtures
        run: python scripts/check-ai-governance.py
      - name: Run AI governance regression tests
        run: PYTEST_DISABLE_PLUGIN_AUTOLOAD=1 pytest -q tests/test_ai_governance.py
