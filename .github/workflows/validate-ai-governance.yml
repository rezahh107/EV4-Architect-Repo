name: validate-ai-governance

on:
  pull_request:
    types: [synchronize, opened, reopened]
    paths:
      - '.github/workflows/**'

permissions:
  contents: write

jobs:
  repair-pr26:
    if: github.event.pull_request.number == 26
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          persist-credentials: true
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.11'
      - name: Apply bounded repair
        run: python .github/pr26_repair.py
      - name: Validate repaired tree
        shell: bash
        run: |
          set -euo pipefail
          python -I -P -m pip install 'jsonschema>=4.22.0' 'PyYAML>=6.0' 'pytest>=8.0.0'
          python -I -P scripts/check-ai-governance.py
          PYTEST_DISABLE_PLUGIN_AUTOLOAD=1 PYTEST_ADDOPTS= PYTEST_PLUGINS= \
            python -I -P -m pytest -c /dev/null --noconftest -q \
            tests/test_ai_governance.py
      - name: Commit repaired tree
        env:
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add scripts/check-ai-governance.py tests/test_ai_governance.py \
            .github/workflows/validate-ai-governance.yml
          git add -u .github
          git diff --cached --check
          git diff --cached --quiet && { echo 'No repair changes staged'; exit 1; }
          git commit -m 'Harden CI proof execution surface'
          git push origin "HEAD:${HEAD_REF}"
