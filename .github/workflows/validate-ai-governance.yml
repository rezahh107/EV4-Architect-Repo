name: validate-ai-governance

on:
  pull_request:
    types: [synchronize, opened, reopened]
    paths:
      - '.github/workflows/**'

permissions:
  contents: read

jobs:
  diagnose-pr26:
    if: github.event.pull_request.number == 26
    runs-on: ubuntu-latest
    steps:
      - name: Execute readable repair script read-only
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/repository
          curl --fail --silent --show-error --location \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H 'X-GitHub-Api-Version: 2022-11-28' \
            "https://api.github.com/repos/${REPOSITORY}/tarball/${HEAD_SHA}" \
            -o /tmp/repository.tar.gz
          tar -xzf /tmp/repository.tar.gz --strip-components=1 -C /tmp/repository
          cd /tmp/repository
          python - <<'PY'
          from pathlib import Path
          path = Path('.github/pr26_repair.py')
          text = path.read_text(encoding='utf-8')
          block = '''rep(
              tests,
              '        run: "python scripts/check-ai-governance.py"\\n',
              '        run: "python -I -P scripts/check-ai-governance.py"\\n',
          )
          '''
          if text.count(block) != 1:
              raise SystemExit('fail-closed idempotence block mismatch')
          path.write_text(text.replace(block, '', 1), encoding='utf-8')
          PY
          set +e
          python .github/pr26_repair.py > /tmp/repair-output.txt 2>&1
          status=$?
          set -e
          cat /tmp/repair-output.txt
          exit "${status}"
