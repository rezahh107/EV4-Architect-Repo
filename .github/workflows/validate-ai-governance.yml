name: diagnose-and-stage-pr26-bounded-repair

on:
  push:
    branches:
      - pr26-repair-carrier-8f31
    paths:
      - '.github/staging/run-pr26-repair'

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repair carrier
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
          persist-credentials: true
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.11'
      - name: Install validation dependencies
        run: python -I -P -m pip install 'jsonschema>=4.22.0' 'PyYAML>=6.0' 'pytest>=8.0.0'
      - name: Apply and validate bounded repair
        id: repair
        env:
          INITIAL_SHA: ea46e401adccd8b3103c8f021a3d5d155653f869
          TARGET_BRANCH: governance/arch-gov-artifact-001-enforcement
        shell: bash
        run: |
          set +e
          (
            set -euo pipefail
            remote_head="$(git ls-remote origin "refs/heads/$TARGET_BRANCH" | awk '{print $1}')"
            test "$remote_head" = "$INITIAL_SHA"
            cat .github/staging/pr26.patch.part.* > /tmp/pr26.patch
            rm -rf /tmp/pr26-repair
            git worktree add --detach /tmp/pr26-repair "$INITIAL_SHA"
            cd /tmp/pr26-repair
            git apply --check /tmp/pr26.patch
            git apply /tmp/pr26.patch
            expected=$'.github/workflows/validate-ai-governance.yml\nscripts/check-ai-governance.py\ntests/test_ai_governance.py'
            actual="$(git diff --name-only | sort)"
            test "$actual" = "$expected"
            python -I -P -m py_compile scripts/check-ai-governance.py
            python -I -P scripts/check-ai-governance.py
            PYTEST_DISABLE_PLUGIN_AUTOLOAD=1 PYTEST_ADDOPTS= PYTEST_PLUGINS= \
              python -I -P -m pytest -c /dev/null --noconftest -q tests/test_ai_governance.py
            git diff --check
            test -z "$(git status --short | grep '^??' || true)"
            git config user.name 'OpenAI bounded repair maintainer'
            git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
            git add -- .github/workflows/validate-ai-governance.yml scripts/check-ai-governance.py tests/test_ai_governance.py
            test "$(git diff --cached --name-only | sort)" = "$expected"
            git commit -m 'Close remaining CI proof bypasses'
            final_sha="$(git rev-parse HEAD)"
            test "$(git rev-parse HEAD^)" = "$INITIAL_SHA"
            remote_head="$(git ls-remote origin "refs/heads/$TARGET_BRANCH" | awk '{print $1}')"
            test "$remote_head" = "$INITIAL_SHA"
            git push origin "HEAD:refs/heads/$TARGET_BRANCH"
            echo "FINAL_SHA=$final_sha"
          ) > /tmp/pr26-result.txt 2>&1
          status=$?
          cat /tmp/pr26-result.txt
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Persist failure diagnostics on carrier ref
        if: ${{ always() && steps.repair.outputs.status != '0' }}
        env:
          CARRIER_BRANCH: pr26-repair-carrier-8f31
        shell: bash
        run: |
          set -euo pipefail
          cp /tmp/pr26-result.txt .github/staging/result.txt
          git config user.name 'OpenAI bounded repair maintainer'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .github/staging/result.txt
          git commit -m 'Record PR26 carrier diagnostics'
          git push origin "HEAD:refs/heads/$CARRIER_BRANCH"
          exit 1
      - name: Delete carrier ref after success
        if: ${{ always() && steps.repair.outputs.status == '0' }}
        env:
          CARRIER_BRANCH: pr26-repair-carrier-8f31
        shell: bash
        run: git push origin --delete "$CARRIER_BRANCH"
