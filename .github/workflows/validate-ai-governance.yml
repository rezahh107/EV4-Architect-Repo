name: validate-ai-governance

on:
  pull_request:
    types: [synchronize, opened, reopened]
    paths:
      - '.github/workflows/**'

permissions:
  contents: read

jobs:
  diagnose-pr26-repair:
    if: github.event.pull_request.number == 26
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact PR head
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.11'
      - name: Diagnose bounded repair locally
        shell: bash
        run: |
          set -euo pipefail
          sed -n '34,719p' .github/workflows/pr26-repair-proof-surface.yml \
            | sed 's/^          //' > /tmp/pr26-repair.py
          echo "extracted_lines=$(wc -l < /tmp/pr26-repair.py)"
          python -m py_compile /tmp/pr26-repair.py
          python /tmp/pr26-repair.py
          git status --short
