              '\n'
              '\n'
              'def _is_checkout(target: str) -> bool:\n',
          )

          replace_exact(
              SCRIPT,
              '        _proof_node_is_blocking(step)\n'
              '        and isinstance(step, dict)\n',
              '        _proof_node_is_blocking(step)\n'
              '        and _proof_job_execution_context_is_trusted(job)\n'
              '        and isinstance(step, dict)\n',
          )

          local_action_code = r'''


def _resolve_local_action(target: str, root: Path) -> tuple[Path, str] | None:
    if not _is_local_action(target) or "@" in target:
        return None
    candidate = (root / target[2:]).resolve()
    root_resolved = root.resolve()
    try:
        relative_dir = candidate.relative_to(root_resolved).as_posix()
    except ValueError:
        return None
    if not relative_dir.startswith(".github/actions/") or not candidate.is_dir():
        return None
    action_files = [
        path
        for path in (candidate / "action.yml", candidate / "action.yaml")
        if path.is_file()
    ]
    if len(action_files) != 1:
        return None
    action_file = action_files[0]
    return action_file, action_file.relative_to(root_resolved).as_posix()


def _validate_action_reference(
    target: str,
    path: str,
    root: Path,
    stack: tuple[str, ...] = (),
) -> list[Diagnostic]:
    if _is_docker_action(target):
        if DOCKER_ACTION_DIGEST.fullmatch(target):
            return []
        return [
            Diagnostic(
                "AIGOV-SECURITY-PROFILE-001_MUTABLE_DOCKER_ACTION",
                path,
                f"Docker action must use an immutable sha256 digest: {target}",
            )
        ]

    if _is_remote_action(target):
        if REMOTE_ACTION_SHA.fullmatch(target):
            return []
        return [
            Diagnostic(
                "AIGOV-SECURITY-PROFILE-001_MUTABLE_ACTION_REF",
                path,
                f"mutable action ref: {target}",
            )
        ]

    resolved = _resolve_local_action(target, root)
    if resolved is None:
        return [
            Diagnostic(
                "AIGOV-SECURITY-PROFILE-001_LOCAL_ACTION_INVALID",
                path,
                f"unsupported or missing local action: {target}",
            )
        ]
    action_file, relative = resolved
    if relative in stack:
        return [
            Diagnostic(
                "AIGOV-SECURITY-PROFILE-001_LOCAL_ACTION_CYCLE",
                path,
                f"local action cycle detected: {' -> '.join((*stack, relative))}",
            )
        ]

    try:
        document = load_actions_yaml(action_file.read_text(encoding="utf-8"))
    except (OSError, yaml.YAMLError, ValueError) as exc:
        return [
            Diagnostic(
                "AIGOV-SECURITY-PROFILE-001_LOCAL_ACTION_INVALID",
                path,
                f"local action cannot be parsed: {exc}",
            )
        ]

    output: list[Diagnostic] = []
    for secret_path in _secret_exposure_paths(document):
        output.append(
            Diagnostic(
                "AIGOV-SECURITY-PROFILE-001_PR_SECRET_EXPOSURE",
                f"{relative}:{secret_path}",
                "direct PR secret exposure is forbidden in local actions",
            )
        )

    runs = document.get("runs")
    if not isinstance(runs, dict) or runs.get("using") != "composite":
        output.append(
            Diagnostic(
                "AIGOV-SECURITY-PROFILE-001_LOCAL_ACTION_INVALID",
                relative,
                "local PR actions must be composite actions",
            )
        )
        return output
    steps = runs.get("steps")
    if not isinstance(steps, list):
        output.append(
            Diagnostic(
                "AIGOV-SECURITY-PROFILE-001_LOCAL_ACTION_INVALID",
                relative,
                "local composite action must define a steps list",
            )
        )
        return output

    current_stack = (*stack, relative)
    for index, step in enumerate(steps):
        step_path = f"{relative}::runs.steps[{index}]"
        if not isinstance(step, dict):
            output.append(
                Diagnostic(
                    "AIGOV-SECURITY-PROFILE-001_LOCAL_ACTION_INVALID",
                    step_path,
                    "local composite step must be a mapping",
                )
            )
            continue
        nested_target = step.get("uses")
        if isinstance(nested_target, str):
            if _is_checkout(nested_target):
                output.append(
                    Diagnostic(
                        "AIGOV-SECURITY-PROFILE-001_LOCAL_ACTION_INVALID",
                        step_path,
                        "repository checkout must remain a direct workflow step",
                    )
                )
            output.extend(
                _validate_action_reference(
                    nested_target,
                    f"{step_path}.uses",
                    root,
                    current_stack,
                )
            )
        elif "run" in step:
            output.append(
                Diagnostic(
                    "AIGOV-SECURITY-PROFILE-001_LOCAL_ACTION_RUN_UNBOUNDED",
                    step_path,
                    "local composite run steps are outside the active bounded profile",
                )
            )
        else:
            output.append(
                Diagnostic(
                    "AIGOV-SECURITY-PROFILE-001_LOCAL_ACTION_INVALID",
                    step_path,
                    "local composite step must contain exactly one uses reference",
                )
            )
    return output
'''
