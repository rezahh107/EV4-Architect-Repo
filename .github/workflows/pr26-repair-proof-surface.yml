          additions = r'''

# PRF-002/003/004 execution-image and proof-surface regressions

def test_job_container_is_rejected_for_security_and_ci_proof(tmp_path):
    text = workflow().replace(
        "    runs-on: ubuntu-latest\n",
        "    runs-on: ubuntu-latest\n"
        "    container:\n      image: attacker/fake-tools:latest\n",
    )
    found = codes(ai_governance.validate_workflow_text("workflow.yml", text))
    assert "AIGOV-SECURITY-PROFILE-001_UNTRUSTED_JOB_RUNTIME" in found
    passed, diagnostics = verify_temp_ci_step(tmp_path, text)
    assert passed is False
    assert "AIGOV-COVERAGE-001_CI_STEP_INVALID" in codes(diagnostics)


def test_job_services_are_rejected_for_security_and_ci_proof(tmp_path):
    text = workflow().replace(
        "    runs-on: ubuntu-latest\n",
        "    runs-on: ubuntu-latest\n"
        "    services:\n      fake:\n        image: attacker/service:latest\n",
    )
    found = codes(ai_governance.validate_workflow_text("workflow.yml", text))
    assert "AIGOV-SECURITY-PROFILE-001_UNTRUSTED_JOB_RUNTIME" in found
    passed, diagnostics = verify_temp_ci_step(tmp_path, text)
    assert passed is False
    assert "AIGOV-COVERAGE-001_CI_STEP_INVALID" in codes(diagnostics)


def test_nonisolated_python_validator_command_is_rejected(tmp_path):
    passed, diagnostics = verify_temp_ci_step(
        tmp_path,
        workflow(validation_run="python scripts/check-ai-governance.py"),
    )
    assert passed is False
    assert "AIGOV-COVERAGE-001_CI_STEP_INVALID" in codes(diagnostics)


@pytest.mark.parametrize(
    "validation_run",
    [
        (
            "PYTEST_DISABLE_PLUGIN_AUTOLOAD=1 PYTEST_ADDOPTS= PYTEST_PLUGINS= "
            "python -I -P -m pytest -q tests/test_ai_governance.py"
        ),
        (
            "PYTEST_DISABLE_PLUGIN_AUTOLOAD=1 PYTEST_ADDOPTS= PYTEST_PLUGINS= "
            "python -I -P -m pytest -c pytest.ini --noconftest -q "
            "tests/test_ai_governance.py"
        ),
        (
            "PYTEST_DISABLE_PLUGIN_AUTOLOAD=1 PYTEST_ADDOPTS= PYTEST_PLUGINS= "
            "python -I -P -m pytest -c /dev/null -q "
            "tests/test_ai_governance.py"
        ),
    ],
)
def test_pytest_config_or_conftest_surface_must_be_closed(
    tmp_path, validation_run
):
    passed, diagnostics = verify_temp_ci_step(
        tmp_path,
        workflow(validation_run=validation_run),
    )
    assert passed is False
    assert "AIGOV-COVERAGE-001_CI_STEP_INVALID" in codes(diagnostics)


def test_ci_path_filters_cover_python_pytest_and_local_action_surfaces(tmp_path):
    text = workflow().replace(
        "on: pull_request",
        "on:\n  pull_request:\n    paths:\n"
        "      - 'scripts/**'\n"
        "      - 'tests/**'\n"
        "      - '.github/workflows/**'",
    )
    passed, diagnostics = verify_temp_ci_step(tmp_path, text)
    assert passed is False
    assert "AIGOV-COVERAGE-001_CI_PATH_FILTER_MISSING" in codes(diagnostics)


def _workflow_with_extra_uses(target: str) -> str:
    return workflow().replace(
        "      - name: Validate\n",
        f"      - name: Extra action\n        uses: {target}\n"
        "      - name: Validate\n",
    )


def test_mutable_docker_action_is_rejected():
    text = _workflow_with_extra_uses("docker://attacker/image:latest")
    assert "AIGOV-SECURITY-PROFILE-001_MUTABLE_DOCKER_ACTION" in codes(
        ai_governance.validate_workflow_text("workflow.yml", text)
    )


def test_digest_pinned_docker_action_is_accepted():
    digest = "a" * 64
    text = _workflow_with_extra_uses(
        f"docker://registry.example/tool@sha256:{digest}"
    )
    assert ai_governance.validate_workflow_text("workflow.yml", text) == []


def _write_local_action(tmp_path: Path, body: str) -> None:
    path = tmp_path / ".github/actions/untrusted/action.yml"
    path.parent.mkdir(parents=True, exist_ok=True)
    path.write_text(body, encoding="utf-8")


def test_local_composite_action_is_inspected_recursively(tmp_path):
    _write_local_action(
        tmp_path,
        '''name: untrusted
runs:
  using: composite
  steps:
    - uses: owner/repo/action@main
''',
    )
    text = _workflow_with_extra_uses("./.github/actions/untrusted")
