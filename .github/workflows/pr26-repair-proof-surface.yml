name: pr26-repair-proof-surface

on:
  pull_request:
    types: [synchronize, opened, reopened]
    paths:
      - '.github/workflows/pr26-repair-proof-surface.yml'

permissions:
  contents: write

jobs:
  repair:
    if: github.event.pull_request.number == 26
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          persist-credentials: true
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.11'
      - name: Apply bounded proof-surface repair
        env:
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          ROOT = Path.cwd()
          SCRIPT = ROOT / "scripts/check-ai-governance.py"
          TESTS = ROOT / "tests/test_ai_governance.py"
          WORKFLOW = ROOT / ".github/workflows/validate-ai-governance.yml"
          SELF = ROOT / ".github/workflows/pr26-repair-proof-surface.yml"

          def replace_exact(path: Path, old: str, new: str, expected: int = 1) -> None:
              text = path.read_text(encoding="utf-8")
              actual = text.count(old)
              if actual != expected:
                  raise SystemExit(
                      f"fail-closed replacement mismatch for {path}: "
                      f"expected {expected}, found {actual}"
                  )
              path.write_text(text.replace(old, new), encoding="utf-8")

          def replace_all(path: Path, old: str, new: str, minimum: int = 1) -> None:
              text = path.read_text(encoding="utf-8")
              actual = text.count(old)
              if actual < minimum:
                  raise SystemExit(
                      f"fail-closed replacement missing for {path}: {old!r}"
                  )
              path.write_text(text.replace(old, new), encoding="utf-8")

          replace_exact(
              SCRIPT,
              'REMOTE_ACTION_SHA = re.compile(r"^[^@\\s]+@[0-9a-fA-F]{40}$")\n'
              'ENV_ASSIGNMENT = re.compile(r"^[A-Za-z_][A-Za-z0-9_]*=.*$", re.DOTALL)\n',
              'REMOTE_ACTION_SHA = re.compile(r"^[^@\\s]+@[0-9a-fA-F]{40}$")\n'
              'DOCKER_ACTION_DIGEST = re.compile(\n'
              '    r"^docker://[^@\\s]+@sha256:[0-9a-fA-F]{64}$"\n'
              ')\n'
              'ENV_ASSIGNMENT = re.compile(r"^[A-Za-z_][A-Za-z0-9_]*=.*$", re.DOTALL)\n',
          )

          replace_exact(
              SCRIPT,
              'SAFE_TEST_INLINE_ENV = {"PYTEST_DISABLE_PLUGIN_AUTOLOAD": "1"}\n'
              'FORBIDDEN_PROOF_ENV_KEYS = {\n'
              '    "PYTEST_ADDOPTS",\n'
              '    "PATH",\n'
              '    "PYTHONPATH",\n'
              '    "BASH_ENV",\n'
              '    "ENV",\n'
              '}\n'
              'SECRET_REFERENCE = re.compile(\n',
              'SAFE_TEST_INLINE_ENV = {\n'
              '    "PYTEST_DISABLE_PLUGIN_AUTOLOAD": "1",\n'
              '    "PYTEST_ADDOPTS": "",\n'
              '    "PYTEST_PLUGINS": "",\n'
              '}\n'
              'FORBIDDEN_PROOF_ENV_KEYS = {\n'
              '    "PATH",\n'
              '    "PYTHONPATH",\n'
              '    "BASH_ENV",\n'
              '    "ENV",\n'
              '}\n'
              'CI_PROOF_SURFACE_PATHS = {\n'
              '    "scripts/check-ai-governance.py",\n'
              '    "scripts/_proof_surface_probe.py",\n'
              '    "tests/test_ai_governance.py",\n'
              '    "tests/_proof_surface_probe.py",\n'
              '    ".github/actions/_proof_surface/action.yml",\n'
              '    "pytest.ini",\n'
              '    "pyproject.toml",\n'
              '    "setup.cfg",\n'
              '    "tox.ini",\n'
              '    "conftest.py",\n'
              '}\n'
              'SECRET_REFERENCE = re.compile(\n',
          )

          replace_exact(
