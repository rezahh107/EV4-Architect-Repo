name: validate-contract-fixtures

on:
  pull_request:
    paths:
      - 'schemas/ev4-architect-output-contract.v1.schema.json'
      - 'fixtures/architect-output-contract/**'
      - 'scripts/check-architect-contract-schema.py'
      - '.github/workflows/validate-contract-fixtures.yml'

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact pull request head
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false
      - name: Assert exact pull request head
        shell: bash
        run: test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha }}"
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.11'
      - run: python -m pip install --upgrade pip
      - run: python -m pip install 'jsonschema>=4.22.0'
      - run: python scripts/check-architect-contract-schema.py