name: validate-architect-bootstrap

on:
  pull_request:
    paths:
      - 'AGENTS.md'
      - 'README.md'
      - 'STATUS.md'
      - 'manifests/architect-conversation-bootstrap.v1.json'
      - 'manifests/architect-pipeline-manifest.v1.json'
      - 'schemas/architect-conversation-bootstrap.v1.schema.json'
      - 'release/EV4_PROJECT_RELEASE_PACK_v1/EV4_FIRST_RUN_GUIDE.md'
      - 'scripts/check-architect-bootstrap.py'
      - 'tests/test_architect_bootstrap_semantics.py'
      - '.github/workflows/validate-architect-bootstrap.yml'

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact pull request head
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false
      - name: Assert exact pull request head
        shell: bash
        run: test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha }}"
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.11'
      - name: Install validation dependencies
        run: python -m pip install 'jsonschema>=4.22.0' 'PyYAML>=6.0' 'pytest>=8.0.0'
      - name: Validate Architect bootstrap semantics
        run: python scripts/check-architect-bootstrap.py
      - name: Run bootstrap mutation tests
        run: PYTEST_DISABLE_PLUGIN_AUTOLOAD=1 pytest -q tests/test_architect_bootstrap_semantics.py
      - name: Validate AI governance
        run: python scripts/check-ai-governance.py
      - name: Validate Architect Producer Gate adoption
        run: python scripts/check-architect-producer-gate-adoption.py --format json
