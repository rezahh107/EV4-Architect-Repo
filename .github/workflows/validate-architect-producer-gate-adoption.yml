name: validate-architect-producer-gate-adoption

# Prompt 01 / ARCH-01: Architect adoption and operator exporter validation.
on:
  pull_request:
    paths:
      - 'README.md'
      - 'STATUS.md'
      - 'contracts/project-gate/**'
      - 'manifests/**'
      - 'schemas/ev4-architect-pipeline-manifest.v1.schema.json'
      - 'fixtures/build-tree/**'
      - 'fixtures/project-gate-export/**'
      - 'fixtures/architect-project-gate-export/**'
      - 'references/ELEMENTOR_V4_OFFICIAL_CAPABILITY_REGISTRY.v1.json'
      - 'docs/BEHAVIORAL_RULE_COVERAGE_PROMPT_01.md'
      - 'docs/PROJECT_GATE_PRODUCER_ADOPTION.md'
      - 'docs/ARCHITECT_PROJECT_GATE_EXPORTER.md'
      - 'scripts/check-architect-producer-gate-adoption.py'
      - 'scripts/export-architect-project-gate.py'
      - 'scripts/architect_project_gate_exporter/**'
      - 'tests/test_architect_producer_gate_adoption.py'
      - 'tests/test_architect_project_gate_exporter*.py'
      - '.github/workflows/validate-architect-producer-gate-adoption.yml'

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact pull request head
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false
      - name: Assert exact pull request head
        shell: bash
        run: test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha }}"
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.11'
      - name: Install test dependencies
        run: python -m pip install 'jsonschema>=4.22.0' 'pytest>=8.0.0'
      - name: Compile exporter
        run: python -m py_compile scripts/export-architect-project-gate.py
      - name: Run Architect Stage Payload regression validator
        run: python scripts/check-architect-stage-payload.py
      - name: Run Architect Producer adoption validator
        run: python scripts/check-architect-producer-gate-adoption.py --format json
      - name: Run Architect Producer adoption tests
        run: PYTEST_DISABLE_PLUGIN_AUTOLOAD=1 pytest -q tests/test_architect_producer_gate_adoption.py
      - name: Run exporter semantic integration tests
        run: >-
          PYTEST_DISABLE_PLUGIN_AUTOLOAD=1 pytest -q tests/test_architect_project_gate_exporter.py
          -k 'not atomic_write_refuses_overwrite_and_roundtrips and not output_path_must_remain_inside_repository and not git_provenance'
      - name: Run exporter atomic integration test
        if: always()
        run: >-
          PYTEST_DISABLE_PLUGIN_AUTOLOAD=1 pytest -q tests/test_architect_project_gate_exporter.py
          -k 'atomic_write_refuses_overwrite_and_roundtrips'
      - name: Run exporter path-boundary integration test
        if: always()
        run: >-
          PYTEST_DISABLE_PLUGIN_AUTOLOAD=1 pytest -q tests/test_architect_project_gate_exporter.py
          -k 'output_path_must_remain_inside_repository'
      - name: Run exporter Git provenance integration tests
        if: always()
        run: >-
          PYTEST_DISABLE_PLUGIN_AUTOLOAD=1 pytest -q tests/test_architect_project_gate_exporter.py
          -k 'git_provenance'
      - name: Run exporter output safety tests
        if: always()
        run: PYTEST_DISABLE_PLUGIN_AUTOLOAD=1 pytest -q tests/test_architect_project_gate_exporter_output_safety.py
      - name: Run exporter provenance tests
        if: always()
        run: PYTEST_DISABLE_PLUGIN_AUTOLOAD=1 pytest -q tests/test_architect_project_gate_exporter_provenance.py
      - name: Run exporter review-fix tests
        if: always()
        run: PYTEST_DISABLE_PLUGIN_AUTOLOAD=1 pytest -q tests/test_architect_project_gate_exporter_review_fixes.py
      - name: Run exporter transaction and ancestry tests
        if: always()
        run: PYTEST_DISABLE_PLUGIN_AUTOLOAD=1 pytest -q tests/test_architect_project_gate_exporter_transaction.py
      - name: Run exporter PRF-004 race tests
        if: always()
        run: PYTEST_DISABLE_PLUGIN_AUTOLOAD=1 pytest -q tests/test_architect_project_gate_exporter_prf004_race.py
