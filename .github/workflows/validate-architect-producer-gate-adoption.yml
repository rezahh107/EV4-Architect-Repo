name: validate-architect-producer-gate-adoption

# Prompt 01: Architect adoption workflow.
on:
  pull_request:
    paths:
      - 'contracts/project-gate/**'
      - 'manifests/**'
      - 'schemas/ev4-architect-pipeline-manifest.v1.schema.json'
      - 'fixtures/build-tree/**'
      - 'fixtures/project-gate-export/**'
      - 'references/ELEMENTOR_V4_OFFICIAL_CAPABILITY_REGISTRY.v1.json'
      - 'docs/BEHAVIORAL_RULE_COVERAGE_PROMPT_01.md'
      - 'scripts/check-architect-producer-gate-adoption.py'
      - 'tests/test_architect_producer_gate_adoption.py'
      - '.github/workflows/validate-architect-producer-gate-adoption.yml'

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.11'
      - name: Install test dependency
        run: python -m pip install 'pytest>=8.0.0'
      - name: Run Architect Producer adoption validator
        run: python scripts/check-architect-producer-gate-adoption.py --format json
      - name: Run Architect Producer adoption tests
        run: PYTEST_DISABLE_PLUGIN_AUTOLOAD=1 pytest -q tests/test_architect_producer_gate_adoption.py
