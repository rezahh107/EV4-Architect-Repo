name: validate-architect-stage-payload

on:
  pull_request:
    paths:
      - 'contracts/ARCHITECT_STAGE_EVIDENCE_PAYLOAD_V1.md'
      - 'schemas/ev4-architect-stage-payload.v1.schema.json'
      - 'fixtures/architect-stage-payload/**'
      - 'fixtures/kernel-decision-receipts/**'
      - 'scripts/check-architect-stage-payload.py'
      - 'scripts/check-architect-sequence-lineage.py'
      - 'scripts/kernel_decision_receipts.py'
      - 'tests/test_architect_stage_payload_validator.py'
      - 'tests/test_architect_sequence_lineage.py'
      - 'tests/test_kernel_decision_receipts.py'
      - 'docs/ux/KERNEL_DECISION_RECEIPTS_WAVE_5.md'
      - 'planning/DECISION_ESCAPE_ROUTES.yml'
      - '.github/workflows/validate-architect-stage-payload.yml'

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.11'
      - name: Install validation dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install 'jsonschema>=4.22.0' 'pytest>=8.0.0'
      - name: Validate Architect Stage Payload fixtures
        run: python scripts/check-architect-stage-payload.py
      - name: Validate Architect sequence lineage fixtures
        run: python scripts/check-architect-sequence-lineage.py
      - name: Validate Kernel decision receipt fixtures
        run: |
          python -m py_compile scripts/kernel_decision_receipts.py
          python -m json.tool fixtures/kernel-decision-receipts/complete-trace-success-receipt.v1.json > /dev/null
          python -m json.tool fixtures/kernel-decision-receipts/missing-trace-warning-receipt.v1.json > /dev/null
      - name: Run validator regression tests
        run: PYTEST_DISABLE_PLUGIN_AUTOLOAD=1 pytest -q tests/test_architect_stage_payload_validator.py tests/test_architect_sequence_lineage.py
      - name: Run receipt regression tests
        run: PYTEST_DISABLE_PLUGIN_AUTOLOAD=1 pytest -q tests/test_kernel_decision_receipts.py
