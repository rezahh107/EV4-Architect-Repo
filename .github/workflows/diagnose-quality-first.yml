name: diagnose-quality-first

on:
  pull_request:
    paths:
      - '**'

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false
      - name: Run concise diagnostics
        id: diagnostics
        continue-on-error: true
        shell: bash
        run: |
          python -m pip install -q 'jsonschema>=4.22.0' 'PyYAML>=6.0'
          failed=0
          : > quality-first-diagnostics.log
          for command in \
            "python scripts/check-architect-bootstrap.py" \
            "python scripts/check-ai-governance.py" \
            "python scripts/check-architect-producer-gate-adoption.py --format json"
          do
            {
              echo "=== $command ==="
              set +e
              eval "$command"
              status=$?
              set -e
              echo "exit_code=$status"
            } >> quality-first-diagnostics.log 2>&1
            if [ "$status" -ne 0 ]; then failed=1; fi
          done
          exit "$failed"
      - name: Upload concise diagnostics
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: quality-first-diagnostics-${{ github.event.pull_request.head.sha }}
          path: quality-first-diagnostics.log
          if-no-files-found: error
          retention-days: 2
      - name: Enforce diagnostics result
        if: steps.diagnostics.outcome != 'success'
        run: exit 1
