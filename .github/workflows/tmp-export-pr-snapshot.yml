name: Export repair payload diagnostics

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  export-payload:
    runs-on: ubuntu-latest
    steps:
      - name: Check out exact PR Head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - name: Record payload diagnostics
        shell: bash
        run: |
          set -euo pipefail
          wc -c .github/repair-payload.part02 .github/repair-payload.part02a .github/repair-payload.part02b
          sha256sum .github/repair-payload.part02 .github/repair-payload.part02a .github/repair-payload.part02b
      - name: Upload payload diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: architect-repair-payload-diagnostics-${{ github.event.pull_request.head.sha || github.sha }}
          path: |
            .github/repair-payload.part02
            .github/repair-payload.part02a
            .github/repair-payload.part02b
          if-no-files-found: error
          retention-days: 1
