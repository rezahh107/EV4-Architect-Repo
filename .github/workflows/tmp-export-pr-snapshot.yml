name: Apply bounded Architect repair

on:
  push:
    branches:
      - codex/fix-fail-late-stage-artifact-validation
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply-bounded-repair:
    if: ${{ !contains(github.event.head_commit.message, '[repair-applied]') }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out exact triggering Head
        uses: actions/checkout@v4
        with:
          ref: codex/fix-fail-late-stage-artifact-validation
          fetch-depth: 0

      - name: Assert Head and integrate required main
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$GITHUB_SHA"
          git fetch --no-tags origin main
          test "$(git rev-parse origin/main)" = "a4b6a8c57d906c69b6f5b4bc79969ffcfbac701a"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git merge --no-ff --no-commit a4b6a8c57d906c69b6f5b4bc79969ffcfbac701a

      - name: Verify and apply bounded repair payload
        shell: bash
        run: |
          set -euo pipefail
          cat .github/repair-payload.part00 \
              .github/repair-payload.part01 \
              .github/repair-payload.part02 \
              .github/repair-payload.part03 \
              .github/repair-payload.part04 \
              .github/repair-payload.part05 > /tmp/architect-repair.b64
          test "$(sha256sum /tmp/architect-repair.b64 | awk '{print $1}')" = "8a635ec501312d0d08d6c977d8df7bea984cadf835f33e59d3af640fa13eb435"
          base64 --decode /tmp/architect-repair.b64 > /tmp/architect-repair.tar.xz
          test "$(sha256sum /tmp/architect-repair.tar.xz | awk '{print $1}')" = "1de9cbe77e807d4125f1a39fe1004ba652dbb1e935b50e51507d7a95f3a69a55"
          tar -xJf /tmp/architect-repair.tar.xz -C .
          rm -f fixtures/architect-pipeline-stage-boundary/invalid/T23-stage-file-mismatch/architectures.json
          rm -f .github/repair-payload.part00 \
                .github/repair-payload.part01 \
                .github/repair-payload.part02 \
                .github/repair-payload.part03 \
                .github/repair-payload.part04 \
                .github/repair-payload.part05
          rm -f .github/workflows/tmp-export-pr-snapshot.yml

      - name: Run bounded validation before publication
        shell: bash
        env:
          PYTHONDONTWRITEBYTECODE: "1"
        run: |
          set -euo pipefail
          python -m pip install 'jsonschema>=4.22.0' 'pytest>=8.0.0' 'PyYAML>=6.0.0'
          python scripts/check-architect-pipeline-stage-boundary.py --fixtures
          PYTEST_DISABLE_PLUGIN_AUTOLOAD=1 pytest -p no:cacheprovider -q \
            tests/test_architect_pipeline_stage_boundary_validator.py \
            tests/test_architect_validation_transaction_mutations.py
          python scripts/check-architect-stage-payload.py
          PYTEST_DISABLE_PLUGIN_AUTOLOAD=1 pytest -p no:cacheprovider -q \
            tests/test_architect_stage_payload_validator.py
          python scripts/check-decision-escape-routes.py
          test -z "$(find . -type d \( -name __pycache__ -o -name .pytest_cache \) -print -quit)"

      - name: Publish one integrated repair commit
        shell: bash
        run: |
          set -euo pipefail
          git add -A
          git status --short
          git commit -m "fix: close Architect validation transaction findings [repair-applied]"
          git push origin HEAD:codex/fix-fail-late-stage-artifact-validation
